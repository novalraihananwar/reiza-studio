<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen Kamar — SmartKos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.r-card{background:#fff;border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative}
.r-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.r-card.s-terisi   {border-color:#D1FAE5;background:#FAFFFE}
.r-card.s-kosong   {border-color:#E2E8F0;background:#FAFAFA}
.r-card.s-booking  {border-color:#FEF3C7;background:#FFFDF5}
.r-card.s-terlambat{border-color:#FEE2E2;background:#FFFAFA}
.r-num{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#0B1D2E}
.r-tenant{font-size:12px;font-weight:600;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.r-price{font-size:11px;color:#94A3B8;font-family:'JetBrains Mono',monospace;margin-top:1px}
.r-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-terisi   {background:#059669}
.d-kosong   {background:#94A3B8}
.d-booking  {background:#F59E0B}
.d-terlambat{background:#EF4444}
.filter-btn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #E2E8F0;background:#fff;color:#64748B;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.filter-btn:hover,.filter-btn.active{border-color:#2563EB;background:#EFF6FF;color:#2563EB}
.floor-label{font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em;padding:8px 0 6px;grid-column:1/-1;border-bottom:1px dashed #E2E8F0;margin-bottom:2px}
</style>
</head>
<body>
<div class="app-layout">
<!-- SIDEBAR (shared) -->
<aside class="app-sidebar" id="app-sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-logo">
      <div class="sidebar-logo-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="white" stroke-width="2.5"/><polyline points="9 22 9 12 15 12 15 22" stroke="white" stroke-width="2.5"/></svg></div>
      <div><div class="sidebar-brand-name">SmartKos</div><div class="sidebar-prop-name">Kos Harmoni Residence</div></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">
      <div class="sidebar-section-label">Menu Utama</div>
      <a href="dashboard.html" class="sidebar-link"><svg class="icon" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/></svg>Dashboard</a>
      <a href="rooms.html" class="sidebar-link active"><svg class="icon" fill="none" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2"/></svg>Kamar <span class="sidebar-badge">40</span></a>
      <a href="tenants.html" class="sidebar-link"><svg class="icon" fill="none" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>Penghuni <span class="sidebar-badge">28</span></a>
      <a href="payments.html" class="sidebar-link"><svg class="icon" fill="none" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" stroke="currentColor" stroke-width="2"/><line x1="1" y1="10" x2="23" y2="10" stroke="currentColor" stroke-width="2"/></svg>Pembayaran</a>
      <a href="complaints.html" class="sidebar-link"><svg class="icon" fill="none" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01" stroke="currentColor" stroke-width="2"/></svg>Komplain</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Keuangan</div>
      <a href="reports.html" class="sidebar-link"><svg class="icon" fill="none" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Laporan</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Pengaturan</div>
      <a href="wa-settings.html" class="sidebar-link"><svg class="icon" fill="none" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" stroke="currentColor" stroke-width="2"/></svg>WhatsApp</a>
      <a href="booking.html" class="sidebar-link"><svg class="icon" fill="none" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Booking Online</a>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">HK</div>
      <div class="sidebar-user-info"><div class="sidebar-user-name">Hendra Kusuma</div><div class="sidebar-user-role">Owner</div></div>
      <a href="login.html" title="Keluar"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
    </div>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<main class="app-main">
<header class="app-topbar">
  <button id="sidebar-toggle" class="btn btn-ghost btn-icon md:hidden">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <div class="flex-1"><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#0B1D2E">Manajemen Kamar</div><div style="font-size:12px;color:#94A3B8">40 kamar total · 4 lantai</div></div>
  <div class="flex items-center gap-3">
    <button class="btn btn-primary btn-sm" onclick="openModal('modal-add-room')">+ Tambah Kamar</button>
    <div style="width:34px;height:34px;border-radius:50%;background:#0B1D2E;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700">HK</div>
  </div>
</header>

<div class="app-content">
  <!-- Stats Bar -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
    <div class="card p-4 flex items-center gap-3">
      <div style="width:36px;height:36px;border-radius:9px;background:#D1FAE5;display:flex;align-items:center;justify-content:center"><div class="r-dot d-terisi"></div></div>
      <div><div style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase">Terisi</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#059669">28</div></div>
    </div>
    <div class="card p-4 flex items-center gap-3">
      <div style="width:36px;height:36px;border-radius:9px;background:#F1F5F9;display:flex;align-items:center;justify-content:center"><div class="r-dot d-kosong"></div></div>
      <div><div style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase">Kosong</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#64748B">7</div></div>
    </div>
    <div class="card p-4 flex items-center gap-3">
      <div style="width:36px;height:36px;border-radius:9px;background:#FEF3C7;display:flex;align-items:center;justify-content:center"><div class="r-dot d-booking"></div></div>
      <div><div style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase">Booking</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#D97706">3</div></div>
    </div>
    <div class="card p-4 flex items-center gap-3">
      <div style="width:36px;height:36px;border-radius:9px;background:#FEE2E2;display:flex;align-items:center;justify-content:center"><div class="r-dot d-terlambat"></div></div>
      <div><div style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase">Telat Bayar</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#DC2626">2</div></div>
    </div>
  </div>

  <!-- Filters & Search -->
  <div class="flex flex-wrap items-center gap-3 mb-5">
    <div class="flex gap-2 flex-wrap">
      <button class="filter-btn active" data-filter="all" onclick="filterRooms(this,'all')">Semua (40)</button>
      <button class="filter-btn" data-filter="terisi" onclick="filterRooms(this,'terisi')">Terisi (28)</button>
      <button class="filter-btn" data-filter="kosong" onclick="filterRooms(this,'kosong')">Kosong (7)</button>
      <button class="filter-btn" data-filter="booking" onclick="filterRooms(this,'booking')">Booking (3)</button>
      <button class="filter-btn" data-filter="terlambat" onclick="filterRooms(this,'terlambat')">Telat (2)</button>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <div style="position:relative">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%)" width="14" height="14" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke="#94A3B8" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="room-search" type="text" placeholder="Cari kamar atau penghuni..." style="padding:8px 14px 8px 32px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13px;font-family:inherit;outline:none;width:220px" oninput="searchRooms(this.value)" onfocus="this.style.borderColor='#2563EB'" onblur="this.style.borderColor='#E2E8F0'">
      </div>
    </div>
  </div>

  <!-- Room Grid -->
  <div class="card p-5">
    <div class="room-grid" id="room-grid"></div>
  </div>
</div>
</main>
</div>

<!-- Room Detail Modal -->
<div id="modal-room" class="modal-overlay" style="display:none">
  <div class="modal modal-lg" id="modal-room-content">
    <div class="modal-header">
      <div class="modal-title" id="modal-room-title">Detail Kamar</div>
      <button class="modal-close" onclick="closeModal('modal-room')">×</button>
    </div>
    <div id="modal-room-body"></div>
  </div>
</div>

<!-- Add Room Modal -->
<div id="modal-add-room" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Tambah Kamar Baru</div>
      <button class="modal-close" onclick="closeModal('modal-add-room')">×</button>
    </div>
    <div class="form-group"><label class="form-label">Nomor Kamar</label><input type="text" class="form-input" placeholder="K-141"></div>
    <div class="grid grid-cols-2 gap-4">
      <div class="form-group"><label class="form-label">Lantai</label><select class="form-select"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
      <div class="form-group"><label class="form-label">Tipe</label><select class="form-select"><option>Standard</option><option>Deluxe</option><option>Premium</option><option>Suite</option></select></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="form-group"><label class="form-label">Harga/Bulan (Rp)</label><input type="number" class="form-input" placeholder="750000"></div>
      <div class="form-group"><label class="form-label">Ukuran</label><input type="text" class="form-input" placeholder="3x4 m²"></div>
    </div>
    <div class="form-group"><label class="form-label">Fasilitas</label><input type="text" class="form-input" placeholder="WiFi, KM Dalam, Kasur, Lemari"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-add-room')">Batal</button><button class="btn btn-primary" onclick="showToast('Kamar berhasil ditambahkan!','success');closeModal('modal-add-room')">Tambah Kamar</button></div>
  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
let currentFilter = 'all';
let currentSearch = '';

function renderRooms() {
  const grid = document.getElementById('room-grid');
  let filtered = SK.rooms;
  if (currentFilter !== 'all') filtered = filtered.filter(r => r.status === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(r => {
      const t = SK.getTenantByRoom(r.id);
      return r.id.toLowerCase().includes(q) || (t && t.name.toLowerCase().includes(q));
    });
  }

  // Group by floor
  const floors = {};
  filtered.forEach(r => { if (!floors[r.floor]) floors[r.floor] = []; floors[r.floor].push(r); });

  let html = '';
  Object.keys(floors).sort().forEach(fl => {
    html += `<div class="floor-label">Lantai ${fl} — ${floors[fl][0].type}</div>`;
    floors[fl].forEach(r => {
      const t = SK.getTenantByRoom(r.id);
      const statusLabel = {terisi:'Terisi',kosong:'Tersedia',booking:'Booking',terlambat:'Telat Bayar'}[r.status];
      const acBadge = r.ac ? '<span style="font-size:9px;background:#DBEAFE;color:#1E40AF;padding:1px 5px;border-radius:4px;font-weight:600">AC</span>' : '';
      html += `<div class="r-card s-${r.status}" onclick="openRoomDetail('${r.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div class="r-num">${r.id}</div>
          <div class="r-dot d-${r.status}"></div>
        </div>
        <div class="r-tenant">${t ? t.name : '— Tersedia —'}</div>
        <div class="r-price">${SK.formatRupiah(r.price)}/bln</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;${r.status==='terisi'?'background:#D1FAE5;color:#065F46':r.status==='kosong'?'background:#F1F5F9;color:#475569':r.status==='booking'?'background:#FEF3C7;color:#92400E':'background:#FEE2E2;color:#991B1B'}">${statusLabel}</span>
          ${acBadge}
        </div>
        ${t?`<div style="font-size:10px;color:#94A3B8;margin-top:5px">Jatuh tempo: ${new Date(t.dueDate).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</div>`:''}
      </div>`;
    });
  });

  if (!html) html = '<div style="grid-column:1/-1;text-align:center;padding:48px 0;color:#94A3B8">Tidak ada kamar ditemukan</div>';
  grid.innerHTML = html;
}

function filterRooms(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderRooms();
}

function searchRooms(q) {
  currentSearch = q;
  renderRooms();
}

function openRoomDetail(roomId) {
  const r = SK.getRoomById(roomId);
  const t = r ? SK.getTenantByRoom(roomId) : null;
  document.getElementById('modal-room-title').textContent = `Detail Kamar ${roomId}`;
  const body = document.getElementById('modal-room-body');
  body.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div style="font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px">Info Kamar</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Nomor</span><span style="font-weight:600;color:#0B1D2E">${r.id}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Tipe</span><span style="font-weight:600;color:#0B1D2E">${r.type}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Lantai</span><span style="font-weight:600;color:#0B1D2E">${r.floor}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Ukuran</span><span style="font-weight:600;color:#0B1D2E">${r.size}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Harga</span><span style="font-weight:700;color:#2563EB;font-family:'JetBrains Mono',monospace">${SK.formatRupiah(r.price)}/bln</span></div>
          <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Status</span><span class="${r.status==='terisi'?'badge badge-green':r.status==='kosong'?'badge badge-gray':r.status==='booking'?'badge badge-amber':'badge badge-red'}">${{terisi:'Terisi',kosong:'Kosong',booking:'Booking',terlambat:'Telat Bayar'}[r.status]}</span></div>
        </div>
        <div style="margin-top:16px;font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Fasilitas</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${r.facilities.map(f=>`<span style="background:#F1F5F9;color:#475569;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500">${f}</span>`).join('')}</div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px">Info Penghuni</div>
        ${t ? `
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Nama</span><span style="font-weight:600;color:#0B1D2E">${t.name}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">WhatsApp</span><a href="https://wa.me/${t.phone.replace(/\D/g,'')}" style="font-weight:600;color:#2563EB">${t.phone}</a></div>
            <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Masuk</span><span style="font-weight:600;color:#0B1D2E">${new Date(t.checkIn).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Durasi</span><span style="font-weight:600;color:#0B1D2E">${t.duration} bulan</span></div>
            <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Jatuh Tempo</span><span style="font-weight:600;color:${t.payStatus==='terlambat'?'#DC2626':'#0B1D2E'}">${new Date(t.dueDate).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Pekerjaan</span><span style="font-weight:600;color:#0B1D2E">${t.job}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#64748B">Status Bayar</span><span class="${t.payStatus==='lunas'?'badge badge-green':t.payStatus==='terlambat'?'badge badge-red':'badge badge-amber'}">${{lunas:'Lunas',terlambat:'Terlambat',pending:'Pending'}[t.payStatus]||t.payStatus}</span></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
            <a href="tenants.html" class="btn btn-primary btn-sm" style="font-size:12px">Lihat Profil</a>
            <a href="payments.html" class="btn btn-success btn-sm" style="font-size:12px">Lihat Tagihan</a>
            <button class="btn btn-outline btn-sm" style="font-size:12px" onclick="showToast('Reminder WA terkirim ke ${t.name}','success')">Kirim WA</button>
          </div>
        ` : `
          <div style="text-align:center;padding:30px 0">
            <div style="font-size:14px;color:#94A3B8;margin-bottom:12px">Kamar ${r.status==='booking'?'dalam proses booking':'tersedia'}</div>
            ${r.status==='kosong'?`<a href="tenants.html" class="btn btn-primary btn-sm">+ Tambah Penghuni</a>`:'<span class="badge badge-amber">Booking aktif</span>'}
          </div>
        `}
      </div>
    </div>`;
  openModal('modal-room');
}

renderRooms();
</script>
</body>
</html>
